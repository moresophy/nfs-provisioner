apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-provisioner
  labels:
    app: nfs-provisioner
  # replace with namespace where provisioner is deployed
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nfs-provisioner
  template:
    metadata:
      labels:
        app: nfs-provisioner
    spec:
      serviceAccountName: nfs-provisioner
      containers:
        - name: nfs-provisioner
          image: moresophy/nfs-provisioner:v4.0.7
          volumeMounts:
            - name: nfs-provisioner-root
              mountPath: /persistentvolumes
          livenessProbe:
            exec:
              command:
                - ls
                - /persistentvolumes
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - ls
                - /persistentvolumes
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: PROVISIONER_NAME
              value: moresophy/nfs-provisioner
            - name: NFS_SERVER
              value: 10.3.243.101
            - name: NFS_PATH
              value: /ifs/kubernetes
      volumes:
        - name: nfs-provisioner-root
          persistentVolumeClaim:
            claimName: nfs-provisioner-root
